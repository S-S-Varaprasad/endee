<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endee AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Endee AI <span>Assistant</span></h1>
            <p>Locally powered by Endee Vector DB and Flan-T5</p>
        </header>

        <div class="chat-container" id="chat-container">
            <div class="message system-message">
                <div class="message-content">Hello! Ask me any question based on the ingested Java notes.</div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your query here..." autocomplete="off">
            <button id="send-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
