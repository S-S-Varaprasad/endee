version: '3.8'

services:
  endee:
    image: endee/endee:latest
    container_name: endee_vector_db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/var/lib/endee/data
    restart: unless-stopped
    environment:
      - ENDEE_PORT=8080
      - ENDEE_MAX_MEMORY=1G

volumes:
  endee_data:
